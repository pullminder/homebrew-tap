name: Audit

on:
  pull_request:
    paths:
      - Formula/**
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Run brew audit --strict
        run: brew audit --strict ./Formula/pullminder.rb

      - name: Run brew style
        run: brew style ./Formula/pullminder.rb

      - name: Open issue on cron failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cron-failure',
              state: 'open',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'chore: brew audit --strict failed on weekly cron',
                body: `The weekly \`brew audit --strict\` check failed on the formula.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['cron-failure'],
              });
            }
